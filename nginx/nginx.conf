events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;

    # Use Docker's embedded DNS so nginx re-resolves upstream IPs after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;

        # ── API → FastAPI backend ─────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            client_max_body_size 10m;
        }

        # ── Model import (large .pt files up to 2 GB) ────────────────────────
        location /api/models/import {
            proxy_pass            http://backend;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout    300s;
            proxy_connect_timeout 75s;
            proxy_send_timeout    300s;
            client_max_body_size  2048m;
        }

        # ── Inference (images + videos up to 500 MB, 10 min timeout) ─────────
        location /api/inference/ {
            proxy_pass            http://backend;
            proxy_set_header      Host              $host;
            proxy_set_header      X-Real-IP         $remote_addr;
            proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout    600s;
            proxy_connect_timeout 75s;
            proxy_send_timeout    600s;
            client_max_body_size  500m;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            proxy_pass http://backend;
        }

        # ── Frontend (Vite dev server with HMR WebSocket) ─────────────────────
        location / {
            proxy_pass             http://frontend;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_http_version     1.1;
            proxy_set_header       Upgrade           $http_upgrade;
            proxy_set_header       Connection        "upgrade";
            proxy_read_timeout     86400s;
        }
    }
}
